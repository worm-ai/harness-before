name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run unit tests
        run: python3 -m unittest tests/test_cli.py -v

      - name: Check ABH document consistency
        run: python3 -m abh doctor

      - name: Check CLI help
        run: python3 -m abh --help

      - name: Check plan listing
        run: python3 -m abh plan list
